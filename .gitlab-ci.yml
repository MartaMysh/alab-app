stages:
  - backend_tests
  - frontend_build
  - docker_build

variables:
  DOCKER_DRIVER: overlay2
  APP_ENV: testing
  DB_CONNECTION: pgsql
  DB_HOST: db
  DB_PORT: 5432
  DB_DATABASE: medical
  DB_USERNAME: postgres
  DB_PASSWORD: postgres

cache:
  paths:
    - backend/vendor/
    - frontend/node_modules/

backend_tests:
  stage: backend_tests
  image: php:8.2
  services:
    - name: postgres:15
      alias: db
  before_script:
    - apt-get update && apt-get install -y unzip git libpq-dev
    - docker-php-ext-install pdo pdo_pgsql
    - cd backend
    - curl -sS https://getcomposer.org/installer | php
    - php composer.phar install
    - cp .env.example .env
    - php artisan key:generate
    - php artisan migrate --force
  script:
    - php artisan test
  artifacts:
    when: always
    paths:
      - backend/storage/logs/
    expire_in: 1 week

frontend_build:
  stage: frontend_build
  image: node:20
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week

docker_build:
  stage: docker_build
  image: docker:latest
  services:
    - docker:dind
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
    - docker build -t $CI_REGISTRY_IMAGE:latest .
    - docker push $CI_REGISTRY_IMAGE:latest
  only:
    - main
