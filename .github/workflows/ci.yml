name: CI Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:

env:
  APP_ENV: testing
  DB_CONNECTION: pgsql
  DB_HOST: 127.0.0.1
  DB_PORT: 5432
  DB_DATABASE: medical
  DB_USERNAME: postgres
  DB_PASSWORD: postgres

jobs:
  backend_tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: medical
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.2
          extensions: pdo_pgsql

      - name: Install Composer dependencies
        working-directory: backend
        run: |
          curl -sS https://getcomposer.org/installer | php
          php composer.phar install

      - name: Prepare Laravel
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          php artisan migrate --force

      - name: Run tests
        working-directory: backend
        run: php artisan test

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: backend-logs
          path: backend/storage/logs/

  frontend_build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: backend_tests

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload dist
        uses: actions/upload-artifact@v3
        with:
          name: frontend-dist
          path: frontend/dist/

  docker_build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: frontend_build
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Login to registry
        run: echo "${{ secrets.CI_REGISTRY_PASSWORD }}" | docker login -u "${{ secrets.CI_REGISTRY_USER }}" --password-stdin ${{ secrets.CI_REGISTRY }}

      - name: Build image
        run: docker build -t ${{ secrets.CI_REGISTRY_IMAGE }}:latest .

      - name: Push image
        run: docker push ${{ secrets.CI_REGISTRY_IMAGE }}:latest
